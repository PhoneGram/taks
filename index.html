<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e293b">
    <meta name="description" content="مهماتي - تطبيق إدارة المهام اليومية">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="مهماتي">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <title>مهماتي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'Tajawal', 'sans-serif'],
                    },
                    borderRadius: {
                        'sm': '0.25rem',
                        'md': '0.375rem',
                        'lg': '0.5rem',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-white dark:bg-slate-900 text-slate-900 dark:text-white transition-colors duration-300">

    <!-- ==================== صفحة الترحيب ==================== -->
    <div id="welcomePage" class="fixed inset-0 flex flex-col items-center justify-center z-50 bg-white dark:bg-slate-900">
        <div class="flex flex-col items-center gap-8 px-6">
            <img src="icon.png" alt="شعار مهماتي" class="w-28 h-28 md:w-36 md:h-36 object-contain drop-shadow-lg">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-800 dark:text-white">مهماتي</h1>
            <button onclick="goToHome()" id="welcomeBtn" class="px-10 py-3.5 bg-slate-800 hover:bg-slate-700 dark:bg-slate-100 dark:hover:bg-slate-200 dark:text-slate-900 text-white font-semibold text-lg rounded-md transition-all duration-200 shadow-md hover:shadow-lg active:scale-95">
                الصفحة الرئيسية
            </button>
        </div>
    </div>

<!-- ==================== الهيدر ==================== -->
<header id="mainHeader" class="hidden fixed top-0 right-0 left-0 z-40 bg-white/95 dark:bg-slate-900/95 backdrop-blur-sm border-b border-slate-200 dark:border-slate-700 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
        <button onclick="goToHome()" class="flex items-center gap-2 hover:opacity-80 transition-opacity bg-transparent border-none cursor-pointer">
            <img src="icon.png" alt="شعار" class="w-8 h-8 object-contain">
            <span class="text-lg font-bold text-slate-800 dark:text-white">مهماتي</span>
        </button>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" id="themeBtn" class="p-2 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="تغيير الوضع">
                <span id="themeIconLight" class="hidden text-xl">☀️</span>
                <span id="themeIconDark" class="text-xl">🌙</span>
            </button>
            <button onclick="goToSettings()" class="p-2 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="الإعدادات">
                <span class="text-xl">⚙️</span>
            </button>
        </div>
    </div>
</header>

    <!-- ==================== الصفحة الرئيسية ==================== -->
    <div id="homePage" class="hidden pt-20 pb-8">
        <div class="max-w-4xl mx-auto px-4">
            <div class="mb-8">
                <h2 id="dateDisplay" class="text-xl md:text-2xl font-bold text-slate-700 dark:text-slate-200 mb-1"></h2>
                <p id="dayDisplay" class="text-lg text-slate-500 dark:text-slate-400"></p>
            </div>
            <div id="tasksList" class="space-y-3 max-h-[60vh] overflow-y-auto pr-1 scrollbar-thin">
                <!-- المهام ستظهر هنا -->
            </div>
            <div id="emptyState" class="text-center py-16 text-slate-400 dark:text-slate-500 hidden">
                <p class="text-6xl mb-4">📋</p>
                <p class="text-lg">لا توجد مهام حالياً</p>
                <p class="text-sm mt-2">اذهب إلى الإعدادات لإضافة مهام جديدة</p>
            </div>
        </div>
    </div>

    <!-- ==================== صفحة الإعدادات ==================== -->
    <div id="settingsPage" class="hidden pt-20 pb-8">
        <div class="max-w-4xl mx-auto px-4">
            <h2 class="text-2xl font-bold mb-6 text-slate-800 dark:text-white">الإعدادات</h2>
            
            <!-- زر إضافة مهمة -->
            <button onclick="openAddModal()" class="w-full mb-6 px-6 py-3.5 bg-slate-800 hover:bg-slate-700 dark:bg-slate-100 dark:hover:bg-slate-200 dark:text-slate-900 text-white font-semibold rounded-md transition-all duration-200 shadow-sm active:scale-[0.98]">
                ➕ إضافة مهمة جديدة
            </button>

            <!-- قائمة المهام -->
            <div class="mb-6">
                <h3 class="text-lg font-semibold mb-3 text-slate-700 dark:text-slate-200">المهام الموجودة</h3>
                <div id="settingsTasksList" class="space-y-2">
                    <!-- المهام ستظهر هنا -->
                </div>
                <div id="settingsEmpty" class="text-center py-8 text-slate-400 dark:text-slate-500 hidden">
                    <p>لا توجد مهام بعد</p>
                </div>
            </div>

            <!-- أزرار أسفل الإعدادات -->
            <div class="space-y-3 border-t border-slate-200 dark:border-slate-700 pt-6">
                <button onclick="downloadJSON()" class="w-full px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-md transition-all duration-200 shadow-sm active:scale-[0.98]">
                    📥 تحميل JSON
                </button>
                <button onclick="document.getElementById('importFile').click()" class="w-full px-6 py-3 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-md transition-all duration-200 shadow-sm active:scale-[0.98]">
                    📤 استيراد JSON
                </button>
                <input type="file" id="importFile" accept=".json" onchange="importJSON(event)" class="hidden">
                <button onclick="deleteAllData()" class="w-full px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-md transition-all duration-200 shadow-sm active:scale-[0.98]">
                    🗑️ حذف بيانات الموقع
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== نافذة منبثقة ==================== -->
    <div id="modalOverlay" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 rounded-lg shadow-2xl w-full max-w-md p-6 border border-slate-200 dark:border-slate-700">
            <h3 id="modalTitle" class="text-xl font-bold mb-5 text-slate-800 dark:text-white">إضافة مهمة</h3>
            
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2 text-slate-600 dark:text-slate-300">أيام المهمة</label>
                <div id="daysContainer" class="grid grid-cols-2 gap-2">
                    <!-- أيام الأسبوع -->
                </div>
            </div>
            
            <div class="mb-5">
                <label for="taskName" class="block text-sm font-semibold mb-2 text-slate-600 dark:text-slate-300">اسم المهمة</label>
                <input type="text" id="taskName" class="w-full px-4 py-2.5 rounded-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-slate-400 dark:focus:ring-slate-500 focus:border-transparent outline-none transition-all" placeholder="أدخل اسم المهمة">
            </div>
            
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-2.5 rounded-md border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
                    إلغاء
                </button>
                <button onclick="saveTask()" id="saveTaskBtn" class="flex-1 px-4 py-2.5 rounded-md bg-slate-800 hover:bg-slate-700 dark:bg-slate-100 dark:hover:bg-slate-200 text-white dark:text-slate-900 font-semibold transition-all">
                    إضافة
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
